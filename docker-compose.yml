services:
  postgres:
    image: postgres:16-alpine
    container_name: aresforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aresforge
      POSTGRES_USER: aresforge
      POSTGRES_PASSWORD: aresforge
    ports:
      - "5433:5432"
    volumes:
      - aresforge_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aresforge -d aresforge"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  aresforge_postgres_data:
